<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1164" cy="639" r="79" fill="#4338ca" opacity="0.11"/>
    <circle cx="1030" cy="309" r="84" fill="#4338ca" opacity="0.16"/>
    <circle cx="963" cy="-16" r="39" fill="#4338ca" opacity="0.19"/>
    <circle cx="1107" cy="-76" r="60" fill="#4338ca" opacity="0.11"/>
    <circle cx="330" cy="190" r="56" fill="#4338ca" opacity="0.09"/>
    <circle cx="-14" cy="647" r="63" fill="#4338ca" opacity="0.07"/>
    <rect x="-14" y="-31" width="28" height="63" rx="8" fill="#4f46e5" opacity="0.10" transform="rotate(41, 445, 345)"/>
    <rect x="12" y="513" width="35" height="57" rx="8" fill="#4f46e5" opacity="0.06" transform="rotate(38, 938, 17)"/>
    <rect x="487" y="531" width="87" height="79" rx="8" fill="#4f46e5" opacity="0.13" transform="rotate(13, 1203, 586)"/>
    <rect x="1156" y="-45" width="20" height="35" rx="8" fill="#4f46e5" opacity="0.07" transform="rotate(38, 924, 400)"/>
    <rect x="-71" y="366" width="99" height="27" rx="8" fill="#4f46e5" opacity="0.04" transform="rotate(42, 474, 666)"/>
    <rect x="81" y="668" width="33" height="93" rx="8" fill="#4f46e5" opacity="0.09" transform="rotate(10, 466, 453)"/>
    <rect x="600" y="-10" width="73" height="68" rx="8" fill="#4f46e5" opacity="0.04" transform="rotate(38, 918, 77)"/>
    <rect x="529" y="506" width="69" height="50" rx="8" fill="#4f46e5" opacity="0.07" transform="rotate(20, 812, 579)"/>
    <polygon points="338,37 390,141 286,141" fill="#4338ca" opacity="0.04"/>
    <polygon points="901,205 964,331 838,331" fill="#4338ca" opacity="0.06"/>
    <polygon points="1226,364 1254,420 1198,420" fill="#4338ca" opacity="0.12"/>
    <polygon points="319,394 402,560 236,560" fill="#4338ca" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,554 C360,592 840,516 1200,554 L1200,630 L0,630Z" fill="#4338ca" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 상위노출 대행
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 신작애니
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#818cf8" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 구글 상위노출 대행 — 신작애니
  </text>
</svg>